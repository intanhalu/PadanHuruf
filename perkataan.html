<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Bina Perkataan (Gabung Bunyi)</title>
    <style>
        /* --- GAYA ASAS & REKA LETAK --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- KONTENA PERMAINAN --- */
        .game-container {
            width: 320px;
            background-color: #c8e6c9;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #a5d6a7;
            position: relative;
        }

        /* --- BAHAGIAN PEMILIH TAHAP (LEVEL) --- */
        .level-select-container {
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-level {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 0;
            border: 2px solid #4a148c;
            border-radius: 15px;
            background-color: white;
            color: #4a148c;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-level.active {
            background-color: #4a148c;
            color: white;
        }

        /* --- MAKLUMAT HEADER & PEMASA --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
        }

        /* --- ELEMEN SOALAN --- */
        .status-section {
            font-size: 20px;
            margin: 5px 0;
        }

        .bubble-text {
            color: #1b5e20;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            background-color: #e8f5e9;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Kotak Soalan Gabung Bunyi */
        .shadow-box {
            width: 100%;
            min-height: 100px;
            background-color: #f5f5f5;
            border: 3px dashed #b39ddb;
            border-radius: 20px;
            margin: 0 auto 25px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            color: #4a148c;
            padding: 10px;
            box-sizing: border-box;
        }

        .hint-text {
            font-size: 14px;
            color: #757575;
            margin-top: 5px;
            font-weight: normal;
        }

        /* --- BAHAGIAN BUTANG PILIHAN --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Ditukar kepada 2 lajur supaya muat perkataan panjang */
            gap: 12px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .btn-option {
            background-color: #4a148c;
            color: #ffffff !important;
            border: none;
            border-radius: 15px;
            padding: 15px 5px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(74, 20, 140, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-option:active {
            transform: scale(0.95);
        }

        /* --- ARAHAN & PAPAN PENDAHULU --- */
        .instruction-section {
            margin-top: 15px;
            color: #1b5e20;
        }

        .instruction-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instruction-desc {
            font-size: 12px;
            font-weight: 500;
            margin: 0;
        }

        .leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }

        /* --- POPUP NOTIFIKASI TERSUAI --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #4a148c;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #4a148c;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46,125,50,0.2);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Antaramuka Game -->
    <div class="game-container">
        <div class="game-card">
            
            <!-- Menu Pilihan Level -->
            <div class="level-select-container">
                <button id="btn-lvl1" class="btn-level active" onclick="changeLevel(1)">LEVEL 1</button>
                <button id="btn-lvl2" class="btn-level" onclick="changeLevel(2)">LEVEL 2</button>
                <button id="btn-lvl3" class="btn-level" onclick="changeLevel(3)">LEVEL 3</button>
            </div>

            <div class="header-info">
                <span>SKOR: <span id="score">0</span></span>
                <span class="lives">NYAWA: <span id="lives">❤️❤️❤️</span></span>
            </div>
            
            <div class="timer-bar">
                <div class="timer-progress" id="timer-bar"></div>
            </div>

            <div class="status-section">
                <div class="bubble-text">Gabungkan bunyi ini!</div>
            </div>

            <!-- Kotak Paparan Gabungan Bunyi -->
            <div class="shadow-box">
                <div id="sound-question">- + -</div>
                <div class="hint-text">Menjadi perkataan apa?</div>
            </div>

            


            <!-- Pilihan Jawapan Perkataan -->
            <div class="options-section" id="options-container"></div>

            <div class="instruction-section">
                <div class="instruction-title">CARA BERMAIN</div>
                <div class="instruction-desc">Pilih perkataan lengkap yang betul hasil daripada gabungan bunyi di atas!</div>
            </div>
        </div>
        
        <!-- Popup Notifikasi Tersuai -->
        <div class="modal-overlay" id="custom-modal">
            <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-desc" id="modal-desc"></div>
            <button class="btn-modal" onclick="closeModal()">OK</button>
    </div>
</div>
    </div>

    <!-- Papan Pendahulu -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">🏆 Papan Pendahulu</h3>
        <ul class="leaderboard-list" id="leaderboard-list"></ul>
    </div>
  
<script>
  // --- DATA PERKATAAN MENGIKUT LEVEL ---
const level1Data = [
{ question: "a + ni", answer: "ani" },
{ question: "i + bu", answer: "ibu" },
{ question: "u + bi", answer: "ubi" },
{ question: "ba + ca", answer: "baca" },
{ question: "ba + ka", answer: "baka" },
{ question: "bu + ku", answer: "buku" },
{ question: "bu + ka", answer: "buka" },
{ question: "ba + tu", answer: "batu" },
{ question: "ma + lu", answer: "malu" },
{ question: "ca + ri", answer: "cari" },
{ question: "ja + la", answer: "jala" },
{ question: "ga + li", answer: "gali" },
{ question: "pa + su", answer: "pasu" },
{ question: "ro + ti", answer: "roti" },
{ question: "su + su", answer: "susu" },
{ question: "ja + ri", answer: "jari" },
{ question: "cu + ci", answer: "cuci" },
{ question: "gu + la", answer: "gula" },
{ question: "ta + ri", answer: "tari" },
{ question: "lu + pa", answer: "lupa" }
];
const level2Data = [
{ question: "ke + re + ta", answer: "kereta" },
{ question: "to + ma + to", answer: "tomato" },
{ question: "bo + ne + ka", answer: "boneka" },
{ question: "ka + me + ra", answer: "kamera" },
{ question: "ke + la + pa", answer: "kelapa" },
{ question: "ke + ru + si", answer: "kerusi" },
{ question: "re + ba + na", answer: "rebana" },
{ question: "se + pa + tu", answer: "sepatu" }
];
const level3Data = [
{ question: "ban + tal", answer: "bantal" },
{ question: "cin + cin", answer: "cincin" },
{ question: "dom + pet", answer: "dompet" },
{ question: "gar + pu", answer: "garpu" },
{ question: "pin + tu", answer: "pintu" },
{ question: "ker + tas", answer: "kertas" },
{ question: "pen + sel", answer: "pensel" },
{ question: "ru + mah", answer: "rumah" },
{ question: "wis + tel", answer: "wistel" },
{ question: "ci + cak", answer: "cicak" },
{ question: "ka + t0k", answer: "katak" },
{ question: "ro + boh", answer: "roboh" }
];
// Mengumpul semua jawapan yang ada untuk dijadikan pilihan salah (distractor)
const allAnswers = [...level1Data, ...level2Data, ...level3Data].map(item => item.answer);
let currentLevelData = level1Data;
let currentLevel = 1;
let currentQuestionItem = null;
let score = 0;
let lives = 3;
let timer = null;
let timeLeft = 7; // Masa dilanjutkan ke 12 saat kerana perkataan memerlukan pembacaan sedikit lama
const totalTime = 7;
let onModalConfirm = null;
// ELEMEN DOM
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');
const soundQuestionDisplay = document.getElementById('sound-question');
const optionsContainer = document.getElementById('options-container');
const timerBar = document.getElementById('timer-bar');
const customModal = document.getElementById('custom-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
// --- FUNGSI TUKAR LEVEL ---
function changeLevel(levelNumber) {
currentLevel = levelNumber;
// Kemas kini gaya butang aktif
for (let i = 1; i <= 3; i++) {
document.getElementById('btn-lvl' + i).classList.remove('active');
}
document.getElementById('btn-lvl' + levelNumber).classList.add('active');
// Tukar set data mengikut level
if (levelNumber === 1) currentLevelData = level1Data;
else if (levelNumber === 2) currentLevelData = level2Data;
else if (levelNumber === 3) currentLevelData = level3Data;
resetGame();
}
// --- FUNGSI JANA SOALAN BARU ---
function generateNewQuestion() {
if (timer) clearInterval(timer);
// 1. Pilih satu soalan secara rawak dari kumpulan level aktif
currentQuestionItem = currentLevelData[Math.floor(Math.random() * currentLevelData.length)];
soundQuestionDisplay.textContent = currentQuestionItem.question;
// 2. Sediakan set jawapan, masukkan jawapan betul dahulu
let options = new Set();
options.add(currentQuestionItem.answer);
// 3. Lengkapkan jawapan dengan pilihan salah sehingga cukup 6 butang
while (options.size < 6) {
let randomWrongAnswer = allAnswers[Math.floor(Math.random() * allAnswers.length)];
options.add(randomWrongAnswer);
}
// 4. Rawakkan kedudukan susunan jawapan
let shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);
// 5. Paparkan butang pilihan jawapan ke dalam skrin (susunan grid 2 lajur)
optionsContainer.innerHTML = '';
shuffledOptions.forEach(word => {
const btn = document.createElement('button');
btn.classList.add('btn-option');
btn.textContent = word;
btn.onclick = function() { checkAnswer(word); };
optionsContainer.appendChild(btn);
});
// 6. Set semula pemasa bar merah
timeLeft = totalTime;
timerBar.style.width = '100%';
timer = setInterval(runTimer, 100);
}
function runTimer() {
timeLeft -= 0.1;
let percentage = (timeLeft / totalTime) * 100;
timerBar.style.width = percentage + '%';
if (timeLeft <= 0) {
clearInterval(timer);
handleWrongAnswer();
}
}
function checkAnswer(selectedWord) {
clearInterval(timer);
if (selectedWord === currentQuestionItem.answer) {
score += 15; // Setiap perkataan betul mendapat 15 mata
scoreDisplay.textContent = score;
generateNewQuestion();
} else {
handleWrongAnswer();
}
}
function handleWrongAnswer() {
lives--;
let hearts = '';
for (let i = 0; i < lives; i++) {
hearts += '❤️';
}
livesDisplay.textContent = hearts;
if (lives > 0) {
showModal('Alamak! ❌', 'Gabungan bunyi kurang tepat. Sila cuba lagi!', function() {
generateNewQuestion();
});
} else {
    let playerName = prompt('Game Over! Skor akhir anda: ' + score + '. Masukkan nama anda:') || 'Pemain';
    leaderboardData.push({ name: playerName, score: score });
    renderLeaderboard();
    showModal('Game Over! 🏁', 'Nyawa anda telah habis. Skor akhir anda: ' + score + ' mata.', function() {
        resetGame();
    });
}
}
function resetGame() {
score = 0;
lives = 3;
scoreDisplay.textContent = score;
livesDisplay.textContent = '❤️❤️❤️';
generateNewQuestion();
}
// --- LOGIK NOTIFIKASI MODAL TERSUAI ---
function showModal(title, desc, callback) {
modalTitle.textContent = title;
modalDesc.textContent = desc;
onModalConfirm = callback;
customModal.classList.add('active');
}
function closeModal() {
customModal.classList.remove('active');
if (onModalConfirm) {
onModalConfirm();
}
}

let leaderboardData = [
    { name: "Ali", score: 150 }
];

function renderLeaderboard() {
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = '';
    const sorted = [...leaderboardData].sort((a, b) => b.score - a.score).slice(0, 10); // top 10
    sorted.forEach((entry, index) => {
        const li = document.createElement('li');
        li.classList.add('leaderboard-item');
        li.innerHTML = `<span class="rank">${index + 1}.</span> ${entry.name}<span>${entry.score} mata</span>`;
        list.appendChild(li);
    });
}


// Jalankan permainan buat kali pertama secara automatik
renderLeaderboard();
generateNewQuestion();


</script>
