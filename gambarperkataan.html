<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Bina Perkataan Dengan Emoji</title>
    <style>
        /* --- GAYA ASAS & REKA LETAK --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- KONTENA PERMAINAN --- */
        .game-container {
            width: 320px;
            background-color: #c8e6c9;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #a5d6a7;
            position: relative;
        }

        /* --- BAHAGIAN PEMILIH TAHAP (LEVEL) --- */
        .level-select-container {
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-level {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 0;
            border: 2px solid #4a148c;
            border-radius: 15px;
            background-color: white;
            color: #4a148c;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-level.active {
            background-color: #4a148c;
            color: white;
        }

        /* --- MAKLUMAT HEADER & PEMASA --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
        }

        /* --- ELEMEN SOALAN --- */
        .status-section {
            font-size: 20px;
            margin: 5px 0;
        }

        .bubble-text {
            color: #1b5e20;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            background-color: #e8f5e9;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Kotak Soalan Ditambah Sokongan Emoji */
        .shadow-box {
            width: 100%;
            min-height: 160px;
            background-color: #f5f5f5;
            border: 3px dashed #b39ddb;
            border-radius: 20px;
            margin: 0 auto 25px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Gaya Paparan Emoji */
        .question-emoji {
            font-size: 65px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .sound-text {
            font-size: 28px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            color: #4a148c;
        }

        .hint-text {
            font-size: 13px;
            color: #757575;
            margin-top: 5px;
            font-weight: normal;
        }

        /* --- BAHAGIAN BUTANG PILIHAN --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .btn-option {
            background-color: #4a148c;
            color: #ffffff !important;
            border: none;
            border-radius: 15px;
            padding: 15px 5px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(74, 20, 140, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-option:active {
            transform: scale(0.95);
        }

        /* --- ARAHAN & PAPAN PENDAHULU --- */
        .instruction-section {
            margin-top: 15px;
            color: #1b5e20;
        }

        .instruction-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instruction-desc {
            font-size: 12px;
            font-weight: 500;
            margin: 0;
        }

        .leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }

        /* --- POPUP NOTIFIKASI TERSUAI --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #4a148c;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #4a148c;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46,125,50,0.2);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Antaramuka Game -->
    <div class="game-container">
        <div class="game-card">
            
            <!-- Menu Pilihan Level -->
            <div class="level-select-container">
                <button id="btn-lvl1" class="btn-level active" onclick="changeLevel(1)">LEVEL 1</button>
                <button id="btn-lvl2" class="btn-level" onclick="changeLevel(2)">LEVEL 2</button>
                <button id="btn-lvl3" class="btn-level" onclick="changeLevel(3)">LEVEL 3</button>
            </div>

            <div class="header-info">
                <span>SKOR: <span id="score">0</span></span>
                <span class="lives">NYAWA: <span id="lives">❤️❤️❤️</span></span>
            </div>
            
            <div class="timer-bar">
                <div class="timer-progress" id="timer-bar"></div>
            </div>

            <div class="status-section">
                <div class="bubble-text">Gabungkan bunyi ini!</div>
            </div>

            <!-- Kotak Paparan Emoji + Gabungan Bunyi -->
            <div class="shadow-box">
                <div id="question-emoji" class="question-emoji">🧱</div>
                <div id="sound-question" class="sound-text">- + -</div>
                <div class="hint-text">Menjadi perkataan apa?</div>
            </div>

            <!-- Pilihan Jawapan Perkataan -->
            <div class="options-section" id="options-container"></div>

            <div class="instruction-section">
                <div class="instruction-title">CARA BERMAIN</div>
                <div class="instruction-desc">Pilih perkataan lengkap yang betul hasil daripada gabungan bunyi di atas!</div>
            </div>
        </div>
    </div>


                 <div class="leaderboard-container">
        <h3 class="leaderboard-title">🏆 Papan Pendahulu</h3>
        <ul class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">1.</span> Ali<span>120 mata</span></li>
            <li class="leaderboard-item"><span class="rank">2.</span> Siti<span>95 mata</span></li>
            <li class="leaderboard-item"><span class="rank">3.</span> Ahmad<span>80 mata</span></li>
        </ul>
    </div>
</div>
    
<script>
// --- DATA PERKATAAN + EMOJI ---
const level1Data = [
{ question: "ba + tu", answer: "batu", emoji: "🧱" },
{ question: "ce + ri", answer: "ceri", emoji: "🍒" },
{ question: "ba + ju", answer: "baju", emoji: "👕" },
{ question: "ja + la", answer: "jala", emoji: "🕸️" },
{ question: "pa + su", answer: "pasu", emoji: "🏺" },
{ question: "ro + ti", answer: "roti", emoji: "🍞" },
{ question: "ha + ti", answer: "hati", emoji: "❤️" },
{ question: "su + su", answer: "susu", emoji: "🥛" },
{ question: "su + ka", answer: "suka", emoji: "😍" },
{ question: "gi + gi", answer: "gigi", emoji: "🦷" },
{ question: "pa + gi", answer: "pagi", emoji: "🌞" },
{ question: "gu + la", answer: "gula", emoji: "🍬" }
]; 
const level2Data = [
{ question: "ke + re + ta", answer: "kereta", emoji: "🚗" },
{ question: "to + ma + to", answer: "tomato", emoji: "🍅" },
{ question: "bo + ne + ka", answer: "boneka", emoji: "🧸" },
{ question: "ka + me + ra", answer: "kamera", emoji: "📷" },
{ question: "ke + la + pa", answer: "kelapa", emoji: "🥥" },
{ question: "ke + ru + si", answer: "kerusi", emoji: "🪑" },
{ question: "re + ba + na", answer: "rebana", emoji: "🥁" },
{ question: "se + pa + tu", answer: "sepatu", emoji: "👟" }


];
const level3Data = [
{ question: "ban + tal", answer: "bantal", emoji: "🛏️" },
{ question: "bu + nga", answer: "bunga", emoji: "🌼" },
{ question: "cin + cin", answer: "cincin", emoji: "💍" },
{ question: "dom + pet", answer: "dompet", emoji: "👛" },
{ question: "dok + tor", answer: "doktor", emoji: "👩‍⚕️" },
{ question: "gar + pu", answer: "garpu", emoji: "🍴" },
{ question: "tu + lis", answer: "tulis", emoji: "✍🏻" },
{ question: "ti + dur", answer: "tidur", emoji: "🛌🏼" },
{ question: "cik + gu", answer: "cikgu", emoji: "👩‍🏫" },
{ question: "bin + tang", answer: "bintang", emoji: "⭐️" },
{ question: "man + di", answer: "mandi", emoji: "🛀🏼" },
{ question: "ker + tas", answer: "kertas", emoji: "📄" },
{ question: "pen + sel", answer: "pensel", emoji: "✏️" },
{ question: "ci + cak", answer: "cicak", emoji: "🦎" },
{ question: "bu + rung", answer: "burung", emoji: "🦜" },
{ question: "pa + yung", answer: "payung", emoji: "☂️" },
{ question: "po + kok", answer: "pokok", emoji: "🌲" },
{ question: "ka + tak", answer: "katak", emoji: "🐸" }
];
const allAnswers = [...level1Data, ...level2Data, ...level3Data].map(item => item.answer);
let currentLevelData = level1Data;
let currentLevel = 1;
let currentQuestionItem = null;
let score = 0;
let lives = 3;
let timer = null;
let timeLeft = 12;
const totalTime = 12;
let onModalConfirm = null;
// ELEMEN DOM
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');
const questionEmojiDisplay = document.getElementById('question-emoji');
const soundQuestionDisplay = document.getElementById('sound-question');
const optionsContainer = document.getElementById('options-container');
const timerBar = document.getElementById('timer-bar');
const customModal = document.getElementById('custom-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
// --- FUNGSI TUKAR LEVEL ---
function changeLevel(levelNumber) {
currentLevel = levelNumber;
for (let i = 1; i <= 3; i++) {
document.getElementById('btn-lvl' + i).classList.remove('active');
}
document.getElementById('btn-lvl' + levelNumber).classList.add('active');
if (levelNumber === 1) currentLevelData = level1Data;
else if (levelNumber === 2) currentLevelData = level2Data;
else if (levelNumber === 3) currentLevelData = level3Data;
resetGame();
}
// --- FUNGSI JANA SOALAN BARU ---
function generateNewQuestion() {
if (timer) clearInterval(timer);
currentQuestionItem = currentLevelData[Math.floor(Math.random() * currentLevelData.length)];
soundQuestionDisplay.textContent = currentQuestionItem.question;
questionEmojiDisplay.textContent = currentQuestionItem.emoji; // <--- MENETAPKAN EMOJI BARU
let options = new Set();
options.add(currentQuestionItem.answer);
while (options.size < 6) {
let randomWrongAnswer = allAnswers[Math.floor(Math.random() * allAnswers.length)];
options.add(randomWrongAnswer);
} [1]
let shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);
optionsContainer.innerHTML = '';
shuffledOptions.forEach(word => {
const btn = document.createElement('button');
btn.classList.add('btn-option');
btn.textContent = word;
btn.onclick = function() { checkAnswer(word); };
optionsContainer.appendChild(btn);
});
timeLeft = totalTime;
timerBar.style.width = '100%';
timer = setInterval(runTimer, 100);
}
function runTimer() {
timeLeft -= 0.1;
let percentage = (timeLeft / totalTime) * 100;
timerBar.style.width = percentage + '%';
if (timeLeft <= 0) {
clearInterval(timer);
handleWrongAnswer();
}
}
function checkAnswer(selectedWord) {
clearInterval(timer);
if (selectedWord === currentQuestionItem.answer) {
score += 15;
scoreDisplay.textContent = score;
generateNewQuestion();
} else {
handleWrongAnswer();
}
}
function handleWrongAnswer() {
lives--;
let hearts = '';
for (let i = 0; i < lives; i++) {
hearts += '❤️';
}
livesDisplay.textContent = hearts; [1]
if (lives > 0) {
showModal('Alamak! ❌', 'Gabungan bunyi atau emoji kurang tepat. Sila cuba lagi!', function() {
generateNewQuestion();
});
} else {
showModal('Game Over! 🏁', 'Nyawa anda telah habis. Skor akhir anda: ' + score + ' mata.', function() {
resetGame();
});
}
} [1]
function resetGame() {
score = 0;
lives = 3;
scoreDisplay.textContent = score;
livesDisplay.textContent = '❤️❤️❤️';
generateNewQuestion();
}
// --- LOGIK NOTIFIKASI MODAL ---
function showModal(title, desc, callback) {
modalTitle.textContent = title;
modalDesc.textContent = desc;
onModalConfirm = callback;
customModal.classList.add('active');
}
function closeModal() {
customModal.classList.remove('active');
if (onModalConfirm) {
onModalConfirm();
}
} 
// Jalankan secara automatik
generateNewQuestion();


</script>
