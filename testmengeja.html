<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permainan Mengeja</title>
    <style>
        /* --- GAYA ASAS & BINGKAI --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Side-by-Side Flex Layout */
        .main-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* Bingkai Merah Jambu Luar */
        .pink-frame {
            width: 340px;
            background-color: #ffccde;
            border: 4px dashed #ff80ab;
            border-radius: 40px;
            padding: 25px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        /* Antaramuka Utama Hijau */
        .game-container {
            width: 100%;
            background-color: #2ecc71;
            border-radius: 25px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.15);
        }

        /* Kad Putih Dalaman */
        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px 15px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: #7f8c8d;
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        /* --- FIX: BAHAGIAN GAMBAR SOALAN TAJAM --- */
        .question-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .question-emoji {
            font-size: 65px; /* Saiz diubah suai */
            line-height: 1.1;
            margin-bottom: 5px;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Android Emoji", sans-serif;
            image-rendering: pixelated; /* Memastikan rendering tajam */
            -webkit-font-smoothing: antialiased;
        }

        .instruction-small {
            color: #bdc3c7;
            font-size: 12px;
            margin: 0;
        }

        /* --- RUANG JAWAPAN --- */
        .slots-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .slot-letter {
            width: 35px;
            height: 40px;
            background-color: #f1f2f6;
            border-radius: 8px;
            border: 2px solid #dcdde1;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BUTANG PILIHAN --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-blue-option {
            background-color: #2979ff;
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 0 #1565c0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-blue-option:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1565c0;
        }

        /* --- INFO SISTEM & PEMASA --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
            transition: width 0.1s linear; /* Animasi pemasa lancar */
        }

        /* --- LEADERBOARD --- */
        .leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none; /* Tukar kepada flex menggunakan JS */
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #2979ff;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #2979ff;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- CONTAINER 1: PERMAINAN -->
    <div class="pink-frame">
        <div class="header-info">
            <span id="question-counter">Soalan: 1/5</span>
            <span class="lives" id="lives-display">❤️❤️❤️❤️❤️</span>
        </div>

        <div class="timer-bar">
            <div class="timer-progress" id="timer-line"></div>
        </div>

        <div class="game-container">
            <div class="game-card">
                <p class="header-title">EJA GAMBAR DI BAWAH</p>
                
                <div class="question-box">
                    <!-- Isian Emoji kekal tajam -->
                    <div class="question-emoji" id="target-emoji">🍎</div>
                    <p class="instruction-small">Pilih huruf yang betul</p>
                </div>

                <div class="slots-container" id="slots-wrap">
                    <!-- Kotak slot huruf diisi oleh JavaScript -->
                </div>
            </div>
        </div>

        <div class="options-section" id="keyboard-options">
            <!-- Butang abjad diisi oleh JavaScript -->
        </div>
    </div>

    <!-- CONTAINER 2: LEADERBOARD BESEBELAHAN -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">Carta Juara</h3>
        <ul class="leaderboard-list">
            <li class="leaderboard-item"><span><b style="color:#ff9f43">1.</b> Aqil</span> <span>5/5</span></li>
            <li class="leaderboard-item"><span><b style="color:#7f8c8d">2.</b> Zara</span> <span>4/5</span></li>
            <li class="leaderboard-item"><span><b style="color:#cd7f32">3.</b> Iris</span> <span>3/5</span></li>
        </ul>
    </div>
</div>

<!-- POPUP MODAL -->
<div class="modal-overlay" id="end-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-heading">Tamat Permainan!</div>
        <div class="modal-desc" id="modal-msg">Skor anda dikira di sini.</div>
        <button class="btn-modal" onclick="resetGame()">Main Semula</button>
    </div>
</div>

<script>
    // Konfigurasi Bank Soalan (Maksimum Had 5 Soalan dipilih secara rawak)
    const databaseSoalan = [
        { emoji: '🍎', jawapan: 'EPAL', pilihan: ['E','P','A','L','B','M','R','T'] },
        { emoji: '🐱', jawapan: 'KUCING', pilihan: ['K','U','C','I','N','G','A','H'] },
        { emoji: '🚗', jawapan: 'KERETA', pilihan: ['K','E','R','T','A','S','B','O'] },
        { emoji: '🐟', jawapan: 'IKAN', pilihan: ['I','K','A','N','U','M','P','L'] },
        { emoji: '🏠', jawapan: 'RUMAH', pilihan: ['R','U','M','A','H','T','K','G'] }
    ];

    let urutanSoalan = [];
    let indeksSemasa = 0;
    let nyawa = 5;
  let pemasa;
const HAD_MASA = 15;
let masaBaki = HAD_MASA;
function initGame() {
// Rawakkan dan ambil tepat 5 soalan sahaja
urutanSoalan = [...databaseSoalan].sort(() => 0.5 - Math.random()).slice(0, 5);
indeksSemasa = 0;
nyawa = 5;
muatSoalan();
}
function muatSoalan() {
clearInterval(pemasa);
if (indeksSemasa >= 5 || nyawa <= 0) {
tamatkanPermainan();
return;
}
// Kemaskini Visual UI
document.getElementById('question-counter').innerText = Soalan: ${indeksSemasa + 1}/5;
kemaskiniNyawa();
let soalanAktif = urutanSoalan[indeksSemasa];
document.getElementById('target-emoji').innerText = soalanAktif.emoji;
// Sediakan ruang kosong (slots)
hurufTerpilih = [];
const slotsWrap = document.getElementById('slots-wrap');
slotsWrap.innerHTML = '';
for (let i = 0; i < soalanAktif.jawapan.length; i++) {
slotsWrap.innerHTML += <div class="slot-letter" id="slot-${i}">&nbsp;</div>;
}
// Sediakan Butang Pilihan Abjad Biru
const kbOptions = document.getElementById('keyboard-options');
kbOptions.innerHTML = '';
soalanAktif.pilihan.forEach((huruf) => {
kbOptions.innerHTML += <button class="btn-blue-option" onclick="pilihHuruf('${huruf}', this)">${huruf}</button>;
});
// Mulakan Pemasa Soalan Baru
masaBaki = HAD_MASA;
mulakanPemasa();
}
function mulakanPemasa() {
const barPemasa = document.getElementById('timer-line');
barPemasa.style.width = '100%';
pemasa = setInterval(() => {
masaBaki -= 0.1;
let peratusBaki = (masaBaki / HAD_MASA) * 100;
barPemasa.style.width = ${peratusBaki}%;
if (masaBaki <= 0) {
clearInterval(pemasa);
tolakNyawa(); // Kehabisan masa bermakna hilang satu nyawa
}
}, 100);
}
function pilihHuruf(huruf, element) {
let soalanAktif = urutanSoalan[indeksSemasa];
let hadHuruf = soalanAktif.jawapan.length;
if (hurufTerpilih.length < hadHuruf) {
element.disabled = true; // Kunci butang selepas ditekan
hurufTerpilih.push(huruf);
// Masukkan huruf ke dalam slot kosong terkini
let slotIndex = hurufTerpilih.length - 1;
document.getElementById(slot-${slotIndex}).innerText = huruf;
// Semak jawapan apabila semua slot telah penuh diguna
if (hurufTerpilih.length === hadHuruf) {
semakJawapan();
}
}
}
function semakJawapan() {
clearInterval(pemasa);
let perkataanDibuat = hurufTerpilih.join('');
let jawapanBetul = urutanSoalan[indeksSemasa].jawapan;
if (perkataanDibuat === jawapanBetul) {
// Betul! Beralih ke soalan seterusnya dalam 1 saat
setTimeout(() => {
indeksSemasa++;
muatSoalan();
}, 1000);
} else {
// Salah! Hilang 1 Nyawa
setTimeout(() => {
tolakNyawa();
}, 800);
}
}
function tolakNyawa() {
nyawa--;
kemaskiniNyawa();
if (nyawa <= 0) {
tamatkanPermainan();
} else {
// Ulang semula soalan yang sama jika jawapan salah/masa tamat
muatSoalan();
}
}
function kemaskiniNyawa() {
let textNyawa = '';
for (let i = 0; i < 5; i++) {
textNyawa += (i < nyawa) ? '❤️' : '🖤';
}
document.getElementById('lives-display').innerText = textNyawa;
}
function tamatkanPermainan() {
clearInterval(pemasa);
const modal = document.getElementById('end-modal');
const tajuk = document.getElementById('modal-heading');
const mesej = document.getElementById('modal-msg');
if (nyawa <= 0) {
tajuk.innerText = "Gagal! 😢";
mesej.innerText = Nyawa anda telah habis. Anda berjaya menjawab ${indeksSemasa} soalan dengan betul.;
} else {
tajuk.innerText = "Tahniah! 🎉";
mesej.innerText = Lengkap 5/5 soalan! Anda pemenang sebenar!;
}
modal.style.display = 'flex';
}
function resetGame() {
document.getElementById('end-modal').style.display = 'none';
initGame();
}
// Jalankan sistem permainan apabila tetingkap siap dimuatkan
window.onload = initGame;

</script>
    let hurufTerpilih = [];
