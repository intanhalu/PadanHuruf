<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cari Huruf Yang Sama</title>
    <style>
        /* --- GAYA ASAS & REKA LETAK --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* --- KONTENA PERMAINAN --- */
        .game-container {
            width: 320px;
            background-color: #c8e6c9;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #a5d6a7;
            position: relative;
        }

        /* --- BAHAGIAN PEMILIH BABAK --- */
        .level-select-container {
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-level {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 0;
            border: 2px solid #4a148c;
            border-radius: 15px;
            background-color: white;
            color: #4a148c;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-level.active {
            background-color: #4a148c;
            color: white;
        }

        /* --- MAKLUMAT HEADER & PEMASA --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
        }

        /* --- ELEMEN SOALAN --- */
        .status-section {
            font-size: 20px;
            margin: 5px 0;
        }

        .bubble-text {
            color: #1b5e20;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            background-color: #e8f5e9;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .shadow-box {
            width: 120px;
            height: 120px;
            background-color: #f5f5f5;
            border: 3px dashed #b39ddb;
            border-radius: 20px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            color: #4a148c;
        }

        /* --- BAHAGIAN BUTANG PILIHAN --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .btn-option {
            background-color: #4a148c;
            color: #ffffff !important;
            border: none;
            border-radius: 15px;
            padding: 10px 0;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(74, 20, 140, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-option:active {
            transform: scale(0.95);
        }

        /* --- ARAHAN & PAPAN PENDAHULU --- */
        .instruction-section {
            margin-top: 15px;
            color: #1b5e20;
        }

        .instruction-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instruction-desc {
            font-size: 12px;
            font-weight: 500;
            margin: 0;
        }

        .leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }

        /* --- POPUP NOTIFIKASI TERSUAI --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #4a148c;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #4a148c;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46,125,50,0.2);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Antaramuka Game -->
    <div class="game-container">
        <div class="game-card">
            
            <!-- Menu Pilihan Babak -->
            <div class="level-select-container">
                <button id="btn-bak1" class="btn-level active" onclick="changeBak(1)">BAK 1</button>
                <button id="btn-bak2" class="btn-level" onclick="changeBak(2)">BAK 2</button>
                <button id="btn-bak3" class="btn-level" onclick="changeBak(3)">BAK 3</button>
                <button id="btn-bak4" class="btn-level" onclick="changeBak(4)">BAK 4</button>
                <button id="btn-bak5" class="btn-level" onclick="changeBak(5)">BAK 5</button>
                <button id="btn-bak6" class="btn-level" onclick="changeBak(6)">BAK 6</button>
            </div>

            <div class="header-info">
                <span>SKOR: <span id="score">0</span></span>
                <span class="lives">NYAWA: <span id="lives">❤️❤️❤️</span></span>
            </div>
            
            <div class="timer-bar">
                <div class="timer-progress" id="timer-bar"></div>
            </div>

            <div class="status-section">
                <div class="bubble-text">Cari huruf ini!</div>
            </div>

            <!-- Kotak Paparan Huruf Soalan -->
            <div class="shadow-box" id="target-letter">-</div>

            <!-- Pilihan Jawapan -->
            <div class="options-section" id="options-container"></div>

            <div class="instruction-section">
                <div class="instruction-title">CARA BERMAIN</div>
                <div class="instruction-desc">Tekan huruf yang sama seperti soalan sebelum masa tamat!</div>
            </div>
        </div>
    </div>

    <!-- Papan Pendahulu -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">🏆 Papan Pendahulu</h3>
        <ul class="leaderboard-list">
            <li class="leaderboard-item"><span class="rank">1.</span> Ali<span>120 mata</span></li>
            <li class="leaderboard-item"><span class="rank">2.</span> Siti<span>95 mata</span></li>
            <li class="leaderboard-item"><span class="rank">3.</span> Ahmad<span>80 mata</span></li>
        </ul>
    </div>
</div>

<!-- Kotak Popup Notifikasi -->
<script>
    // --- DATA KUMPULAN HURUF ---
const poolBak1 = ["a", "i", "u", "b", "n"];
const poolBak2 = ["a", "i", "u", "b", "n", "m", "s", "k"];
const poolBak3 = ["a", "i", "u", "b", "n", "m", "s", "k", "c", "p", "t", "y"];
const poolBak4 = ["a", "i", "u", "b", "n", "m", "s", "k", "c", "p", "t", "y", "d", "g", "l", "r"];
const poolBak5 = ["a", "i", "u", "b", "n", "m", "s", "k", "c", "p", "t", "y", "d", "g", "l", "r", "f", "h", "j", "w", "z"];
const poolBak6 = ["a", "i", "u", "b", "n", "m", "s", "k", "c", "p", "t", "y", "d", "g", "l", "r", "f", "h", "j", "w", "z", "v", "o", "e"];
const fullAlphabet = "abcdefghijklmnopqrstuvwxyz";
let currentPool = poolBak1;
let currentBak = 1;
let targetLetter = '';
let score = 0;
let lives = 3;
let timer = null;
let timeLeft = 10;
const totalTime = 10;
let onModalConfirm = null;
// AMBIL ELEMEN HTML
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');
const targetLetterDisplay = document.getElementById('target-letter');
const optionsContainer = document.getElementById('options-container');
const timerBar = document.getElementById('timer-bar');
const customModal = document.getElementById('custom-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
// --- FUNGSI TUKAR BABAK ---
function changeBak(bakNumber) {
currentBak = bakNumber;
// Kemas kini gaya butang aktif
for (let i = 1; i <= 6; i++) {
document.getElementById('btn-bak' + i).classList.remove('active');
}
document.getElementById('btn-bak' + bakNumber).classList.add('active');
// Tukar pool abjad
if (bakNumber === 1) currentPool = poolBak1;
else if (bakNumber === 2) currentPool = poolBak2;
else if (bakNumber === 3) currentPool = poolBak3;
else if (bakNumber === 4) currentPool = poolBak4;
else if (bakNumber === 5) currentPool = poolBak5;
else if (bakNumber === 6) currentPool = poolBak6;
resetGame();
}
// --- FUNGSI JANA SOALAN & PILIHAN JAWAPAN ---
function generateNewQuestion() {
if (timer) clearInterval(timer);
// Ambi huruf soalan dari pool aktif
targetLetter = currentPool[Math.floor(Math.random() * currentPool.length)];
targetLetterDisplay.textContent = targetLetter;
// Bina 6 pilihan jawapan rawak A-Z
let options = new Set();
options.add(targetLetter);
while (options.size < 6) {
let randomLetter = fullAlphabet[Math.floor(Math.random() * fullAlphabet.length)];
options.add(randomLetter);
}
let shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);
// Paparkan butang pilihan jawapan
optionsContainer.innerHTML = '';
shuffledOptions.forEach(letter => {
const btn = document.createElement('button');
btn.classList.add('btn-option');
btn.textContent = letter;
btn.onclick = function() { checkAnswer(letter); };
optionsContainer.appendChild(btn);
});
// Jalankan semula pemasa
timeLeft = totalTime;
timerBar.style.width = '100%';
timer = setInterval(runTimer, 100);
}
function runTimer() {
timeLeft -= 0.1;
let percentage = (timeLeft / totalTime) * 100;
timerBar.style.width = percentage + '%';
if (timeLeft <= 0) {
clearInterval(timer);
handleWrongAnswer();
}
}
function checkAnswer(selectedLetter) {
clearInterval(timer);
if (selectedLetter === targetLetter) {
score += 10;
scoreDisplay.textContent = score;
generateNewQuestion();
} else {
handleWrongAnswer();
}
}
function handleWrongAnswer() {
lives--;
let hearts = '';
for (let i = 0; i < lives; i++) {
hearts += '❤️';
}
livesDisplay.textContent = hearts;
if (lives > 0) {
showModal('Alamak! ❌', 'Jawapan anda salah atau masa telah tamat. Sila cuba lagi!', function() {
generateNewQuestion();
});
} else {
showModal('Game Over! 🏁', 'Nyawa anda telah habis. Skor akhir anda: ' + score + ' mata.', function() {
resetGame();
});
}
}
function resetGame() {
score = 0;
lives = 3;
scoreDisplay.textContent = score;
livesDisplay.textContent = '❤️❤️❤️';
generateNewQuestion();
}
// --- LOGIK NOTIFIKASI MODAL ---
function showModal(title, desc, callback) {
modalTitle.textContent = title;
modalDesc.textContent = desc;
onModalConfirm = callback;
customModal.classList.add('active');
}
function closeModal() {
customModal.classList.remove('active');
if (onModalConfirm) {
onModalConfirm();
}
}
// JALANKAN PERMAINAN SECARA TERUS (Mengelakkan isu sekatan onload browser)
generateNewQuestion();


</script>
