<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cari Huruf Yang Sama</title>
    <style>
        body {
            font-family: 'poppins', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Antaramuka Utama (Bingkai ungu) */
        .game-container {
            width: 320px;
            background-color: #B24DD1;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        /* Kad Putih Dalaman */
        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #a5d6a7;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
            transition: width 0.1s linear;
        }

        .status-section {
            font-size: 20px;
            margin: 5px 0;
        }

        .bubble-text {
            color: #1b5e20;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            background-color: #e8f5e9;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
        }

       /* Kotak Paparan Huruf Soalan */
        .shadow-box {
            width: 120px;
            height: 120px;
            background-color: #f5f5f5;
            border: 3px dashed #81c784;
            border-radius: 20px;
            margin: 0 auto 25px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: bold;
            font-family: 'Poppins', sans-serif; /* <--- KEMAS KINI DI SINI */
            user-select: none;
            color: #2e7d32;
        }

        /* Pilihan Jawapan Huruf Berwarna di Bahagian Bawah */
        .options-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn-option {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 10px 0;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Poppins', sans-serif; /* <--- KEMAS KINI DI SINI */
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-option:active {
            transform: scale(0.95);
        }

        .btn-option:disabled {
            background-color: #b2bec3;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Bahagian Teks Bawah */
        .instruction-section {
            margin-top: 15px;
            color: #1b5e20;
        }

        .instruction-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instruction-desc {
            font-size: 12px;
            font-weight: 500;
            margin: 0;
        }

        /* Papan Pendahulu (Leaderboard) */
        .leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Antaramuka Game -->
    <div class="game-container">
        <div class="game-card">
            <div class="header-info">
                <span>SKOR: <span id="score">0</span></span>
                <span class="lives">NYAWA: <span id="lives">❤️❤️❤️</span></span>
            </div>
            
            <div class="timer-bar">
                <div class="timer-progress" id="timer-bar"></div>
            </div>

            <div class="status-section">
                <div class="bubble-text">Cari huruf ini!</div>
            </div>

            <!-- Kotak Paparan Huruf Soalan -->
            <div class="shadow-box" id="target-letter">A</div>

            <!-- Pilihan Jawapan -->
            <div class="options-section" id="options-container">
                <!-- Butang jawapan akan dijana melalui JavaScript -->
            </div>

            <div class="instruction-section">
                <div class="instruction-title">CARA BERMAIN</div>
                <div class="instruction-desc">Tekan huruf yang sama seperti soalan sebelum masa tamat!</div>
            </div>
        </div>
    </div>

    <!-- Papan Pendahulu -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">🏆 Papan Pendahulu</h3>
        <ul class="leaderboard-list">
            
        </ul>
    </div>
</div>

<script>
    const alphabet = "abcdefghijklmnopqrstuvwxyz";
    let targetLetter = '';
    let score = 0;
    let lives = 3;
    let timer;
    let timeLeft = 10;
    const totalTime = 10; // 10 saat

    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives');
    const targetLetterDisplay = document.getElementById('target-letter');
    const optionsContainer = document.getElementById('options-container');
    const timerBar = document.getElementById('timer-bar');

    function generateNewQuestion() {
        // Pilih huruf sasaran
        targetLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
        targetLetterDisplay.textContent = targetLetter;

        // Jana pilihan jawapan (pastikan ada huruf sasaran)
        let options = new Set();
        options.add(targetLetter);

        while (options.size < 6) {
            let randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
            options.add(randomLetter);
        }

        // Shuffle pilihan jawapan
        let shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);

        // Paparkan pilihan
        optionsContainer.innerHTML = '';
        shuffledOptions.forEach(letter => {
            const btn = document.createElement('button');
            btn.classList.add('btn-option');
            btn.textContent = letter;
            btn.onclick = () => checkAnswer(letter);
            optionsContainer.appendChild(btn);
        });

        // Reset Timer
        timeLeft = totalTime;
        timerBar.style.width = '100%';
        clearInterval(timer);
        timer = setInterval(runTimer, 100); // Kemas kini setiap 0.1 saat untuk smooth
    }

    function runTimer() {
        timeLeft -= 0.1;
        let percentage = (timeLeft / totalTime) * 100;
        timerBar.style.width = percentage + '%';

        if (timeLeft <= 0) {
            clearInterval(timer);
            handleWrongAnswer();
        }
    }

    function checkAnswer(selectedLetter) {
        clearInterval(timer);
        if (selectedLetter === targetLetter) {
            score += 10;
            scoreDisplay.textContent = score;
            generateNewQuestion();
        } else {
            handleWrongAnswer();
        }
    }

    function handleWrongAnswer() {
        lives--;
        let hearts = '';
        for (let i = 0; i < lives; i++) {
            hearts += '❤️';
        }
        livesDisplay.textContent = hearts;

        if (lives > 0) {
            alert('Salah! Cuba lagi.');
            generateNewQuestion();
        } else {
            alert('Permainan Tamat! Skor Akhir Anda: ' + score);
            resetGame();
        }
    }

    function resetGame() {
        score = 0;
        lives = 3;
        scoreDisplay.textContent = score;
        livesDisplay.textContent = '❤️❤️❤️';
        generateNewQuestion();
    }

    // Mulakan permainan
generateNewQuestion();
</script>
