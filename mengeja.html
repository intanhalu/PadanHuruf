<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari Mengeja</title>
    <style>
        /* --- GAYA ASAS & BINGKAI MERAH JAMBU --- */
        body{
            font-family: 'Arial', sans-serif;
            background-color: #f1f8e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Bingkai Merah Jambu Luar (Pink Frame) */
        .pink-frame {
            width: 340px;
            background-color: #ffccde;
            border: 4px dashed #ff80ab;
            border-radius: 40px;
            padding: 25px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        /* Antaramuka Utama Hijau */
        .game-container {
            width: 100%;
            background-color: #2ecc71;
            border-radius: 25px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.15);
        }

        /* Kad Putih Dalaman */
        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px 15px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: #7f8c8d;
            font-size: 13px;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        /* --- BAHAGIAN GAMBAR SOALAN --- */
        .question-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .question-emoji {
            font-size: 55px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .instruction-small {
            color: #bdc3c7;
            font-size: 12px;
            margin: 0;
        }

        /* --- RUANG JAWAPAN (SLOTS) --- */
        .slots-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .slot-letter {
            width: 35px;
            height: 40px;
            background-color: #f1f2f6;
            border-radius: 8px;
            border: 2px solid #dcdde1;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BAHAGIAN BUTANG ABJAD BIRU --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-blue-option {
            background-color: #2979ff;
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 0 #1565c0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-blue-option:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1565c0;
        }

        .btn-blue-option:disabled {
            background-color: #b2bec3;
            box-shadow: 0 4px 0 #b2bec3;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* --- MAKLUMAT HEADER & PEMASA --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            color: #2e7d32;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 5px;
        }

        .lives {
            color: #d32f2f;
            font-size: 16px;
        }

        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
        }

.leaderboard-container {
            width: 320px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #2e7d32;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e8f5e9;
            font-size: 14px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }


        /* --- TEKS BAWAH (MARI MENCEJA) --- */
        .bottom-info-section {
            margin-top: 20px;
        }

        .main-instruction-title {
            color: #4a148c;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 0 0 8px 0;
            font-family: 'Arial Black', sans-serif;
        }

        .main-instruction-desc {
            color: #2c3e50;
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        /* --- CUSTOM POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #2979ff;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #2979ff;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>

</head>
<body>

 <div class="main-wrapper">
    <!-- Antaramuka Game Hijau -->
    <div class="game-container">
        <div class="game-card">
            
            <div class="header-title">Pelajaran Mengeja 1</div>

            <!-- Kotak Paparan Emoji Soalan -->
            <div class="question-box">
                <div id="question-emoji" class="question-emoji">🪵</div>
                <p class="instruction-small">Sentuh abjad untuk mengeja</p>
            </div>

            <!-- Tempat Kosong Huruf Ejaan -->
            <div class="slots-container" id="slots-container"></div>

        </div>
    </div>

    <!-- Pilihan Papan Kekunci Abjad Biru Luar -->
    <div class="options-section" id="options-container"></div>

    <!-- Bahagian Teks Bawah Bingkai -->
    <div class="bottom-info-section">
        <h2 class="main-instruction-title">MARI MENGEJA</h2>
        <p class="main-instruction-desc">Lengkapkan perkataan dengan<br>huruf yang betul!</p>
    </div>
   

   

    <!-- Leaderboard Container -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">Leaderboard</h3>
        <ul class="leaderboard-list">
            <!-- Your leaderboard items go here -->
        </ul>
    </div>

</div>

    
</div>

<!-- Popup Notifikasi -->
<div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Syabas!</div>
        <div class="modal-desc" id="modal-desc">Mesej kandungan...</div>
        <button class="btn-modal" onclick="closeModal()">Teruskan</button>
    </div>
</div>

<script>
    // --- DATA SOALAN PERKATAAN & EMOJI ---
    const gameData = [
        { word: "kayu", emoji: "🪵" },
        { word: "batu", emoji: "🧱" },
        { word: "roti", emoji: "🍞" },
        { word: "gula", emoji: "🍬" },
        { word: "susu", emoji: "🥛" },
        { word: "buku", emoji: "📖" },
        { word: "baju", emoji: "👕" }
    ];

    const fullAlphabet = "abcdefghijklmnopqrstuvwxyz";
    
    let currentItem = null;
    let currentSpelling = [];
    let onModalConfirm = null;

    // ELEMEN DOM
    const questionEmojiDisplay = document.getElementById('question-emoji');
    const slotsContainer = document.getElementById('slots-container');
    const optionsContainer = document.getElementById('options-container');
    const customModal = document.getElementById('custom-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');

    // --- FUNGSI JANA SOALAN BARU ---
    function generateNewQuestion() {
        // 1. Pilih perkataan secara rawak
        currentItem = gameData[Math.floor(Math.random() * gameData.length)];
        questionEmojiDisplay.textContent = currentItem.emoji;
        currentSpelling = [];

        // 2. Bina petak kosong mengikut jumlah huruf perkataan
        slotsContainer.innerHTML = '';
        for (let i = 0; i < currentItem.word.length; i++) {
            const slot = document.createElement('div');
            slot.classList.add('slot-letter');
            slot.id = 'slot-' + i;
            slot.textContent = '';
            slotsContainer.appendChild(slot);
        }

        // 3. Gunakan Set untuk mengumpul huruf unik bagi butang pilihan (Fix tulisan berulang & tetapkan 6 pilihan)
        let optionsSet = new Set(currentItem.word.split(''));

        // Lengkapkan butang jawapan dengan abjad rawak sehingga cukup 6 pilihan agar grid kelihatan penuh dan cantik
        while (optionsSet.size < 8) {
            let randomLetter = fullAlphabet[Math.floor(Math.random() * fullAlphabet.length)];
            optionsSet.add(randomLetter);
        }

        // 4. Rawakkan susunan kedudukan huruf pilihan
        let shuffledLetters = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        // 5. Jana butang abjad biru
        optionsContainer.innerHTML = '';
        shuffledLetters.forEach((letter) => {
            const btn = document.createElement('button');
            btn.classList.add('btn-option', 'btn-blue-option');
            btn.textContent = letter.toLowerCase(); // Papar huruf besar
            btn.dataset.letter = letter; // Simpan huruf kecil asal untuk semakan logik
            btn.onclick = function() { checkLetterInput(letter, btn); };
            optionsContainer.appendChild(btn);
        });
    }

    // --- FUNGSI SEMAK JAWAPAN KETIKAN ---
    function checkLetterInput(letter, buttonElement) {
        let currentIndex = currentSpelling.length;
        let expectedLetter = currentItem.word[currentIndex];

        // Jika huruf yang ditekan betul mengikut urutan ejaan semasa
        if (letter === expectedLetter) {
            currentSpelling.push(letter);
            document.getElementById('slot-' + currentIndex).textContent = letter.toLowerCase();
            
            // Kira baki keperluan huruf tersebut dalam ejaan yang belum diselesaikan
            let totalNeeded = currentItem.word.split('').filter(l => l === letter).length;
            let currentTyped = currentSpelling.filter(l => l === letter).length;
            
            // Hanya kunci butang (disabled) jika huruf itu tidak diperlukan lagi untuk ejaan seterusnya
            if (currentTyped >= totalNeeded) {
                buttonElement.disabled = true;
            }

            // Jika ejaan telah lengkap sepenuhnya
            if (currentSpelling.length === currentItem.word.length) {
                showModal('Tahniah! 🎉', 'Ejaan anda tepat untuk perkataan "' + currentItem.word.toLowerCase() + '".', function() {
                    generateNewQuestion();
                });
            }
        } else {
            // Jika tersalah tekan abjad, tetapkan semula ejaan perkataan semasa untuk peluang kedua
            showModal('Alamak! ❌', 'Abjad itu tidak betul untuk urutan ejaan ini. Cuba lagi!', function() {
                // Reset ejaan soalan sedia ada tanpa tukar soalan baharu
                currentSpelling = [];
                for (let i = 0; i < currentItem.word.length; i++) {
                    document.getElementById('slot-' + i).textContent = '';
                }
                // Aktifkan semula semua butang pilihan abjad
                const buttons = optionsContainer.querySelectorAll('button');
                buttons.forEach(btn => btn.disabled = false);
            });
        }
    }

    // --- PENGENDALIAN MODAL POPUP ---
    function showModal(title, desc, callback) {
        modalTitle.textContent = title;
        modalDesc.textContent = desc;
        onModalConfirm = callback;
        customModal.classList.add('active');
    }

    function closeModal() {
        customModal.classList.remove('active');
        if (onModalConfirm) {
            onModalConfirm();
        }
    }

    // Jalankan permainan buat kali pertama secara automatik selepas skrin siap sedia
    generateNewQuestion();
</script>
