<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari Mengeja</title>
    <style>
        /* --- GAYA ASAS & BINGKAI --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* Bingkai Merah Jambu Luar (Pink Frame) */
        .pink-frame {
            width: 340px;
            background-color: #ffccde;
            border: 4px dashed #ff80ab;
            border-radius: 40px;
            padding: 25px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        /* Antaramuka Utama Hijau */
        .game-container {
            width: 100%;
            background-color: #2ecc71;
            border-radius: 25px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.15);
        }

        /* --- BAHAGIAN PEMILIH BABAK --- */
        .level-select-container {
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-level {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 0;
            border: 2px solid #2979ff;
            border-radius: 12px;
            background-color: white;
            color: #2979ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-level.active {
            background-color: #2979ff;
            color: white;
        }

        /* Kad Putih Dalaman */
        .game-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 15px 12px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        /* MAKLUMAT HEADER */
        .header-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #27ae60;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .lives {
            color: #d32f2f;
        }

        /* BAR PEMASA */
        .timer-bar {
            width: 100%;
            background-color: #f1f2f6;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
        }

        /* --- BAHAGIAN SOALAN --- */
        .question-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .question-emoji {
            font-size: 55px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .instruction-small {
            color: #bdc3c7;
            font-size: 11px;
            margin: 0 0 10px 0;
        }

        /* --- RUANG JAWAPAN TEMPAT KOSONG --- */
        .slots-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 10px;
            min-height: 40px;
            width: 100%;
            flex-wrap: wrap;
        }

        .slot-letter {
            width: 32px;
            height: 38px;
            background-color: #f1f2f6;
            border-radius: 8px;
            border: 2px solid #dcdde1;
            font-size: 22px;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BAHAGIAN BUTANG ABJAD BIRU --- */
        .options-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-blue-option {
            background-color: #2979ff;
            color: #ffffff !important;
            border: none;
            border-radius: 12px;
            padding: 10px 0;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 0 #1565c0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-blue-option:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1565c0;
        }

        .btn-blue-option:disabled {
            background-color: #b2bec3;
            box-shadow: 0 4px 0 #b2bec3;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* --- TEKS BAWAH --- */
        .bottom-info-section {
            margin-top: 20px;
        }

        .main-instruction-title {
            color: #4a148c;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 0 0 8px 0;
            font-family: 'Arial Black', sans-serif;
        }

        .main-instruction-desc {
            color: #2c3e50;
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        /* --- LEADERBOARD --- */
        .leaderboard-container {
            width: 340px;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 20px;
            border: 4px solid #2979ff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #4a148c;
            font-family: 'Arial Black', sans-serif;
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #f1f2f6;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff9f43;
            margin-right: 10px;
        }

        /* --- CUSTOM POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #2979ff;
        }

        .modal-title {
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #2979ff;
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
        }

        .btn-modal {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Bingkai Merah Jambu Luar -->
    <div class="pink-frame">
        
        <!-- Antaramuka Game Hijau -->
        <div class="game-container">
            
            <!-- Menu Pilihan Babak -->
            <div class="level-select-container">
                <button id="btn-bak1" class="btn-level active" onclick="changeBak(1)">PEL. 1</button>
                <button id="btn-bak2" class="btn-level" onclick="changeBak(2)">PEL. 2</button>
                <button id="btn-bak3" class="btn-level" onclick="changeBak(3)">PEL. 3</button>
            </div>

            <!-- Kad Putih Dalaman -->
            <div class="game-card">
                
                <div class="header-info">
                    <span>SKOR: <span id="score">0</span></span>
                    <span class="lives">NYAWA: <span id="lives">❤️❤️❤️</span></span>
                </div>
                
                <div class="timer-bar">
                    <div class="timer-progress" id="timer-bar"></div>
                </div>

                <!-- Bahagian Soalan & Kotak Jawapan Dinamik -->

                <!-- Bahagian Soalan & Kotak Jawapan Dinamik (Disatukan Tanpa Pertindihan) -->
                <div class="question-box">
                    <div id="question-emoji" class="question-emoji">🪵</div>
                    <p class="instruction-small">Sentuh abjad untuk mengeja</p>
                    <div class="slots-container" id="slots-container"></div>
                </div>

            </div> <!-- Penutup game-card -->
        </div> <!-- Penutup game-container -->

        <!-- Pilihan Papan Kekunci Abjad Biru Luar -->
        <div class="options-section" id="options-container"></div>

        <!-- Bahagian Teks Bawah Bingkai -->
        <div class="bottom-info-section">
            <h2 class="main-instruction-title">MARI MENGEJA</h2>
            <p class="main-instruction-desc">Lengkapkan perkataan dengan<br>huruf yang betul!</p>
        </div>

    </div> <!-- Penutup pink-frame -->

    <!-- Papan Pendahulu (Diletakkan di luar secara kemas pada bahagian kanan/bawah) -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">🏆 Papan Pendahulu</h3>
        <ul class="leaderboard-list" id="leaderboard-list">
            <!-- Data dinamik akan dimasukkan melalui JavaScript, senarai statik dibuang -->
        </ul>
    </div>
</div> <!-- Penutup main-wrapper -->

<!-- Popup Notifikasi -->
<div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Syabas!</div>
        <div class="modal-desc" id="modal-desc">Mesej kandungan...</div>
        <button class="btn-modal" onclick="closeModal()">Teruskan</button>
    </div>
</div>

</body>

   

<script>
   // --- UTUTAN DATA SOALAN PERKATAAN ---
const babak1Data = [
{ word: "kayu", emoji: "🪵" },
{ word: "batu", emoji: "🧱" },
{ word: "roti", emoji: "🍞" },
{ word: "gula", emoji: "🍬" },
{ word: "susu", emoji: "🥛" },
{ word: "buku", emoji: "📖" },
{ word: "baju", emoji: "👕" }
];
const babak2Data = [
{ word: "kereta", emoji: "🚗" },
{ word: "tomato", emoji: "🍅" },
{ word: "boneka", emoji: "🧸" },
{ word: "kamera", emoji: "📷" },
{ word: "kelapa", emoji: "🥥" },
{ word: "kerusi", emoji: "🪑" }
];
const babak3Data = [
{ word: "bantal", emoji: "🛏️" },
{ word: "cincin", emoji: "💍" },
{ word: "dompet", emoji: "👛" },
{ word: "garpu", emoji: "🍴" },
{ word: "kertas", emoji: "📄" },
{ word: "pensel", emoji: "✏️" }
];
const fullAlphabet = "abcdefghijklmnopqrstuvwxyz";
let currentPool = babak1Data;
let currentBak = 1;
let currentItem = null;
let currentSpelling = [];
let score = 0;
let lives = 3;
let timer = null;
let timeLeft = 15;
const totalTime = 15;
let onModalConfirm = null;
let leaderboardData = [
{ name: "Ali", score: 120 },
{ name: "Siti", score: 90 },
{ name: "Ahmad", score: 60 }
];
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');
const questionEmojiDisplay = document.getElementById('question-emoji');
const slotsContainer = document.getElementById('slots-container');
const optionsContainer = document.getElementById('options-container');
const timerBar = document.getElementById('timer-bar');
const customModal = document.getElementById('custom-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
const leaderboardListDisplay = document.getElementById('leaderboard-list');
function changeBak(bakNumber) {
currentBak = bakNumber;
for (let i = 1; i <= 3; i++) {
document.getElementById('btn-bak' + i).classList.remove('active');
}
document.getElementById('btn-bak' + bakNumber).classList.add('active');
if (bakNumber === 1) currentPool = babak1Data;
else if (bakNumber === 2) currentPool = babak2Data;
else if (bakNumber === 3) currentPool = babak3Data;
resetGame();
}
function generateNewQuestion() {
if (timer) clearInterval(timer);
currentItem = currentPool[Math.floor(Math.random() * currentPool.length)];
questionEmojiDisplay.textContent = currentItem.emoji;
currentSpelling = [];
slotsContainer.innerHTML = '';
for (let i = 0; i < currentItem.word.length; i++) {
const slot = document.createElement('div');
slot.classList.add('slot-letter');
slot.id = 'slot-' + i;
slot.textContent = '';
slotsContainer.appendChild(slot);
}
let optionsSet = new Set(currentItem.word.split(''));
while (optionsSet.size < 6) {
let randomLetter = fullAlphabet[Math.floor(Math.random() * fullAlphabet.length)];
optionsSet.add(randomLetter);
}
let shuffledLetters = Array.from(optionsSet).sort(() => Math.random() - 0.5);
optionsContainer.innerHTML = '';
shuffledLetters.forEach((letter) => {
const btn = document.createElement('button');
btn.classList.add('btn-option', 'btn-blue-option');
btn.textContent = letter.toUpperCase();
btn.onclick = function() { checkLetterInput(letter, btn); };
optionsContainer.appendChild(btn);
});
timeLeft = totalTime;
timerBar.style.width = '100%';
timer = setInterval(runTimer, 100);
}
function runTimer() {
timeLeft -= 0.1;
let percentage = (timeLeft / totalTime) * 100;
timerBar.style.width = percentage + '%';
if (timeLeft <= 0) {
clearInterval(timer);
handleWrongAnswer('Masa tamat! ⏰');
}
}
function checkLetterInput(letter, buttonElement) {
let currentIndex = currentSpelling.length;
let expectedLetter = currentItem.word[currentIndex];
if (letter === expectedLetter) {
currentSpelling.push(letter);
document.getElementById('slot-' + currentIndex).textContent = letter.toUpperCase();
let totalNeeded = currentItem.word.split('').filter(l => l === letter).length;
let currentTyped = currentSpelling.filter(l => l === letter).length;
if (currentTyped >= totalNeeded) {
buttonElement.disabled = true;
}
if (currentSpelling.length === currentItem.word.length) {
clearInterval(timer);
score += 15;
scoreDisplay.textContent = score;
showModal('Tahniah! 🎉', 'Ejaan anda tepat untuk perkataan "' + currentItem.word.toUpperCase() + '".', function() {
generateNewQuestion();
});
}
} else {
clearInterval(timer);
handleWrongAnswer('Ejaan salah! ❌');
}
}
function handleWrongAnswer(reasonMessage) {
lives--;
let hearts = '';
for (let i = 0; i < lives; i++) {
hearts += '❤️';
}
livesDisplay.textContent = hearts;
if (lives > 0) {
showModal(reasonMessage, 'Urutan ejaan kurang tepat. Sila cuba lagi!', function() {
currentSpelling = [];
for (let i = 0; i < currentItem.word.length; i++) {
document.getElementById('slot-' + i).textContent = '';
}
const buttons = optionsContainer.querySelectorAll('button');
buttons.forEach(btn => btn.disabled = false);
timeLeft = totalTime;
timerBar.style.width = '100%';
timer = setInterval(runTimer, 100);
});
} else {
showModal('Game Over! 🏁', 'Nyawa anda telah habis. Skor akhir anda: ' + score + ' mata.', function() {
updateLeaderboard(score);
resetGame();
});
}
}
function resetGame() {
score = 0;
lives = 3;
scoreDisplay.textContent = score;
livesDisplay.textContent = '❤️❤️❤️';
generateNewQuestion();
}
function renderLeaderboard() {
leaderboardListDisplay.innerHTML = '';
leaderboardData.sort((a, b) => b.score - a.score);
leaderboardData.forEach((player, index) => {
const item = document.createElement('li');
item.classList.add('leaderboard-item');
item.innerHTML = <span><span class="rank">${index + 1}.</span> ${player.name}</span> <span>${player.score} mata</span>;
leaderboardListDisplay.appendChild(item);
});
}
function updateLeaderboard(finalScore) {
let playerName = prompt("Permainan Tamat! Masukkan nama anda untuk Papan Pendahulu:");
if (!playerName || playerName.trim() === "") {
playerName = "Pemain Rawak";
}
leaderboardData.push({ name: playerName.trim(), score: finalScore });
renderLeaderboard();
}
function showModal(title, desc, callback) {
modalTitle.textContent = title;
modalDesc.textContent = desc;
onModalConfirm = callback;
customModal.classList.add('active');
}
function closeModal() {
customModal.classList.remove('active');
if (onModalConfirm) {
onModalConfirm();
}
}
renderLeaderboard();
generateNewQuestion();



</script>
