<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari Mengeja</title>
    <style>
        /* --- ASAS & LATAR BELAKANG --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e2f3e4; /* Latar belakang hijau lembut cair */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Layout Bersebelahan */
        .main-wrapper {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
        }

        /* --- KANDUNGAN UTAMA (KIRI) --- */
        .game-card {
            width: 420px;
            background-color: #ffffff;
            border: 3px solid #a1dbb2;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Butang Tingkat (Bak 1 - Bak 6) */
        .bak-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .bak-btn {
            background-color: #ffffff;
            border: 1.5px solid #4a148c;
            color: #4a148c;
            border-radius: 20px;
            padding: 8px 0;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .bak-btn.active {
            background-color: #4a148c;
            color: #ffffff;
        }

        /* Skor & Nyawa Baris */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .skor-text {
            color: #2e7d32;
        }

        .nyawa-text {
            color: #d32f2f;
        }

        /* Bar Pemasa Nipis Kelabu */
        .timer-bar {
            width: 100%;
            background-color: #eeeeee;
            height: 5px;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background-color: #2ecc71;
            transition: width 0.1s linear;
        }

        /* Zon Soalan */
        .instruction-tag {
            background-color: #e2f3e4;
            color: #2e7d32;
            padding: 6px 18px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin: 0 auto 15px auto;
        }

        .question-box {
            border: 2px dashed #9b5de5;
            border-radius: 20px;
            width: 110px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            background-color: #ffffff;
        }

        .target-letter {
            font-size: 55px;
            font-weight: bold;
            color: #4a148c;
            font-family: 'Comic Sans MS', sans-serif;
        }

        /* Pilihan Huruf Ungu Semat */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-purple-option {
            background-color: #4a148c;
            color: #ffffff;
            border: none;
            border-radius: 18px;
            padding: 15px 0;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 0 #320b66;
            transition: transform 0.1s;
        }

        .btn-purple-option:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #320b66;
        }

        /* Panduan Cara Bermain */
        .footer-guide {
            text-align: center;
            margin-top: auto;
        }

        .guide-title {
            color: #2e7d32;
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .guide-desc {
            color: #7f8c8d;
            font-size: 12px;
            margin: 0;
        }

        /* --- PAPAN PENDAHULU (KANAN) --- */
        .leaderboard-card {
            width: 300px;
            background-color: #ffffff;
            border: 3px solid #a1dbb2;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .leaderboard-title {
            color: #2e7d32;
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            font-size: 14px;
            color: #333333;
            font-weight: bold;
        }

        .rank-num {
            color: #ff9f43;
            margin-right: 15px;
            display: inline-block;
            width: 15px;
        }

        .player-name {
            color: #333333;
        }

        .player-score {
            color: #555555;
        }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }

        .modal-box {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            width: 290px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 2px solid #4a148c;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #4a148c;
            margin-bottom: 12px;
        }

        .modal-desc {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn-modal {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>

</head>
<body>

 <div class="main-wrapper">
    <!-- Antaramuka Game Hijau -->
    <div class="game-container">
        <div class="game-card">
            
            <div class="header-title">Pelajaran Mengeja 1</div>

            <!-- Kotak Paparan Emoji Soalan -->
            <div class="question-box">
                <div id="question-emoji" class="question-emoji">🪵</div>
                <p class="instruction-small">Sentuh abjad untuk mengeja</p>
            </div>

            <!-- Tempat Kosong Huruf Ejaan -->
            <div class="slots-container" id="slots-container"></div>

        </div>
    </div>

    <!-- Pilihan Papan Kekunci Abjad Biru Luar -->
    <div class="options-section" id="options-container"></div>

    <!-- Bahagian Teks Bawah Bingkai -->
    <div class="bottom-info-section">
        <h2 class="main-instruction-title">MARI MENGEJA</h2>
        <p class="main-instruction-desc">Lengkapkan perkataan dengan<br>huruf yang betul!</p>
    </div>
   

   

    <!-- Leaderboard Container -->
    <div class="leaderboard-container">
        <h3 class="leaderboard-title">Leaderboard</h3>
        <ul class="leaderboard-list">
            <!-- Your leaderboard items go here -->
        </ul>
    </div>

</div>

    
</div>

<!-- Popup Notifikasi -->
<div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Syabas!</div>
        <div class="modal-desc" id="modal-desc">Mesej kandungan...</div>
        <button class="btn-modal" onclick="closeModal()">Teruskan</button>
    </div>
</div>

<script>
    // --- DATA SOALAN PERKATAAN & EMOJI ---
    const gameData = [
        { word: "kayu", emoji: "🪵" },
        { word: "batu", emoji: "🧱" },
        { word: "roti", emoji: "🍞" },
        { word: "gula", emoji: "🍬" },
        { word: "susu", emoji: "🥛" },
        { word: "buku", emoji: "📖" },
        { word: "baju", emoji: "👕" }
    ];

    const fullAlphabet = "abcdefghijklmnopqrstuvwxyz";
    
    let currentItem = null;
    let currentSpelling = [];
    let onModalConfirm = null;

    // ELEMEN DOM
    const questionEmojiDisplay = document.getElementById('question-emoji');
    const slotsContainer = document.getElementById('slots-container');
    const optionsContainer = document.getElementById('options-container');
    const customModal = document.getElementById('custom-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');

    // --- FUNGSI JANA SOALAN BARU ---
    function generateNewQuestion() {
        // 1. Pilih perkataan secara rawak
        currentItem = gameData[Math.floor(Math.random() * gameData.length)];
        questionEmojiDisplay.textContent = currentItem.emoji;
        currentSpelling = [];

        // 2. Bina petak kosong mengikut jumlah huruf perkataan
        slotsContainer.innerHTML = '';
        for (let i = 0; i < currentItem.word.length; i++) {
            const slot = document.createElement('div');
            slot.classList.add('slot-letter');
            slot.id = 'slot-' + i;
            slot.textContent = '';
            slotsContainer.appendChild(slot);
        }

        // 3. Gunakan Set untuk mengumpul huruf unik bagi butang pilihan (Fix tulisan berulang & tetapkan 6 pilihan)
        let optionsSet = new Set(currentItem.word.split(''));

        // Lengkapkan butang jawapan dengan abjad rawak sehingga cukup 6 pilihan agar grid kelihatan penuh dan cantik
        while (optionsSet.size < 8) {
            let randomLetter = fullAlphabet[Math.floor(Math.random() * fullAlphabet.length)];
            optionsSet.add(randomLetter);
        }

        // 4. Rawakkan susunan kedudukan huruf pilihan
        let shuffledLetters = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        // 5. Jana butang abjad biru
        optionsContainer.innerHTML = '';
        shuffledLetters.forEach((letter) => {
            const btn = document.createElement('button');
            btn.classList.add('btn-option', 'btn-blue-option');
            btn.textContent = letter.toLowerCase(); // Papar huruf besar
            btn.dataset.letter = letter; // Simpan huruf kecil asal untuk semakan logik
            btn.onclick = function() { checkLetterInput(letter, btn); };
            optionsContainer.appendChild(btn);
        });
    }

    // --- FUNGSI SEMAK JAWAPAN KETIKAN ---
    function checkLetterInput(letter, buttonElement) {
        let currentIndex = currentSpelling.length;
        let expectedLetter = currentItem.word[currentIndex];

        // Jika huruf yang ditekan betul mengikut urutan ejaan semasa
        if (letter === expectedLetter) {
            currentSpelling.push(letter);
            document.getElementById('slot-' + currentIndex).textContent = letter.toLowerCase();
            
            // Kira baki keperluan huruf tersebut dalam ejaan yang belum diselesaikan
            let totalNeeded = currentItem.word.split('').filter(l => l === letter).length;
            let currentTyped = currentSpelling.filter(l => l === letter).length;
            
            // Hanya kunci butang (disabled) jika huruf itu tidak diperlukan lagi untuk ejaan seterusnya
            if (currentTyped >= totalNeeded) {
                buttonElement.disabled = true;
            }

            // Jika ejaan telah lengkap sepenuhnya
            if (currentSpelling.length === currentItem.word.length) {
                showModal('Tahniah! 🎉', 'Ejaan anda tepat untuk perkataan "' + currentItem.word.toLowerCase() + '".', function() {
                    generateNewQuestion();
                });
            }
        } else {
            // Jika tersalah tekan abjad, tetapkan semula ejaan perkataan semasa untuk peluang kedua
            showModal('Alamak! ❌', 'Abjad itu tidak betul untuk urutan ejaan ini. Cuba lagi!', function() {
                // Reset ejaan soalan sedia ada tanpa tukar soalan baharu
                currentSpelling = [];
                for (let i = 0; i < currentItem.word.length; i++) {
                    document.getElementById('slot-' + i).textContent = '';
                }
                // Aktifkan semula semua butang pilihan abjad
                const buttons = optionsContainer.querySelectorAll('button');
                buttons.forEach(btn => btn.disabled = false);
            });
        }
    }

    // --- PENGENDALIAN MODAL POPUP ---
    function showModal(title, desc, callback) {
        modalTitle.textContent = title;
        modalDesc.textContent = desc;
        onModalConfirm = callback;
        customModal.classList.add('active');
    }

    function closeModal() {
        customModal.classList.remove('active');
        if (onModalConfirm) {
            onModalConfirm();
        }
    }

    // Jalankan permainan buat kali pertama secara automatik selepas skrin siap sedia
    generateNewQuestion();
</script>
